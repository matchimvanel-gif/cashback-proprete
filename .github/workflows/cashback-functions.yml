# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Renouveler les contrats des établissements
# Tourne tous les jours à minuit heure Cameroun
# ═══════════════════════════════════════════════════════════════════════════════
  renouveler-contrats:
    name: Renouveler contrats établissements
    runs-on: ubuntu-latest
    # Tourne : cron minuit OU dispatch manuel avec action contrats OU action tout
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'renouveler-contrats' || github.event.inputs.action == 'tout'))

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dépendances du script
        run: |
          cd scripts
          npm install

      - name: Lancer le renouvellement des contrats
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          cd scripts
          node renouveler-contrats.js

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Analyser les responsables suspects
# Tourne toutes les heures
# ═══════════════════════════════════════════════════════════════════════════════
  analyser-responsables:
    name: Analyser responsables suspects
    runs-on: ubuntu-latest
    # Tourne : cron horaire OU dispatch manuel avec action responsables OU tout
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'analyser-responsables' || github.event.inputs.action == 'tout'))

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dépendances du script
        run: |
          cd scripts
          npm install

      - name: Lancer l'analyse des responsables suspects
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          cd scripts
          node analyser-responsables.js
