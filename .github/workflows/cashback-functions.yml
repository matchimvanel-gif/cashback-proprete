# ╔══════════════════════════════════════════════════════════════════════════╗
# ║     CASHBACK PROPRETÉ — GITHUB ACTIONS WORKFLOW                         ║
# ║     Déploie les Cloud Functions + lance les crons planifiés              ║
# ║     Fichier : .github/workflows/cashback-functions.yml                  ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# SECRETS GITHUB À CONFIGURER dans Settings > Secrets > Actions :
#   FIREBASE_TOKEN         → obtenu via : firebase login:ci
#   FIREBASE_PROJECT_ID    → cash-back-de-proprete
#   FIREBASE_CLIENT_EMAIL  → depuis la clé de service Firebase
#   FIREBASE_PRIVATE_KEY   → depuis la clé de service Firebase

name: Deploy Cloud Functions + Crons Cashback

on:
  # Déploiement automatique quand functions/index.js change sur la branche main
  push:
    branches:
      - main
      - essaie2
    paths:
      - 'functions/index.js'
      - 'functions/package.json'
      - 'scripts/**'
      - '.github/workflows/cashback-functions.yml'

  # ─── CRONS PLANIFIÉS ───────────────────────────────────────────────────────
  schedule:
    # Renouvellement des contrats : tous les jours à minuit (heure Douala = UTC+1)
    - cron: '0 23 * * *'    # 23h UTC = minuit heure Cameroun

    # Analyse des responsables suspects : toutes les heures
    - cron: '0 * * * *'

  # Lancement manuel depuis l'interface GitHub (pour tests ou urgences)
  workflow_dispatch:
    inputs:
      action:
        description: 'Action à exécuter'
        required: true
        default: 'renouveler-contrats'
        type: choice
        options:
          - renouveler-contrats
          - analyser-responsables
          - tout

